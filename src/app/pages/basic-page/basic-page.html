<section class="mx-10">
  <h1 class="text-2xl font-bold text-center">Pipes Básicos</h1>
  <h3 class="text-center">Pipes incluidos en Angular</h3>
</section>


<div class="text-center shadow stats stats-vertical lg:stats-horizontal">
  <div class="stat">
    <div class="stat-title">Lowercase Pipe</div>
    <div class="stat-value">{{ nameLower() | lowercase }}</div>
    <div class="stat-desc">{{nameUpper()}}</div>
  </div>

  <div class="stat">
    <div class="stat-title">Uppercase Pipe</div>
    <div class="stat-value">{{ nameLower() | uppercase }}</div>
    <div class="stat-desc">{{nameLower()}}</div>
  </div>

  <div class="stat">
    <div class="stat-title">Title Case Pipe</div>
    <div class="stat-value">{{ fullName() | titlecase }}</div>
    <div class="stat-desc">{{fullName()}}</div>
  </div>
</div>
